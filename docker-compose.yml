services:
  relatorios:
    build: .
    image: relatorios-agua-zangari
    container_name: relatorios-agua
    ports:
      - "8090:80"        # http://localhost:8090
    restart: unless-stopped

  # Alternativa para DESENVOLVIMENTO: monta a pasta relatorio/ ao vivo
  # (editar arquivos reflete no navegador sem rebuild). Use com:
  #   docker compose up relatorios-dev
  relatorios-dev:
    image: nginx:1.27-alpine
    container_name: relatorios-agua-dev
    profiles: ["dev"]
    ports:
      - "8081:80"        # http://localhost:8081
    volumes:
      - ./relatorio:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
