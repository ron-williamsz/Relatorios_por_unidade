server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compressão (os JS são grandes: echarts ~1MB, dados ~1.1MB, jspdf, html2canvas)
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_vary         on;
    gzip_types        text/plain text/css application/javascript text/javascript
                      application/json image/svg+xml application/xml;

    # HTML muda com frequência (novos dados) -> sem cache
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Bibliotecas de terceiros -> cache longo
    location /vendor/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
